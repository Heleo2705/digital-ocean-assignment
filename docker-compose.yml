version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.3
    restart: always
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: appdb
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    command: ["start-dev"]
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - backend

  app:
    build: .
    restart: on-failure
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/appdb?sslmode=disable
      REDIS_ADDR: redis:6379
      KEYCLOAK_URL: http://keycloak:8080
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      keycloak:
        condition: service_healthy
    networks:
      - backend

  worker:
    build: .
    restart: on-failure
    command: ["/app/worker"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/appdb?sslmode=disable
      REDIS_ADDR: redis:6379
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      keycloak:
        condition: service_healthy
    networks:
      - backend

  nginx:
    image: nginx:stable
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - frontend
      - backend

volumes:
  postgres-data:
  redis-data:

networks:
  frontend:
  backend:
